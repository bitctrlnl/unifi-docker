services:
  unifi-mongo:
    image: mongo:8
    container_name: unifi-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
      MONGO_DBNAME: ${MONGO_DBNAME:-unifi}
      MONGO_AUTHSOURCE: ${MONGO_AUTHSOURCE:-admin}
    volumes:
      - ./mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - unifi-net

  unifi:
    image: bitctrlnl/unifi:${UNIFI_IMAGE_TAG}
    container_name: unifi
    restart: unless-stopped
    depends_on:
      - unifi-mongo
    environment:
      DB_URI: mongodb://${MONGO_APP_USERNAME}:${MONGO_APP_PASSWORD}@unifi-mongo:27017/unifi
      STATDB_URI: mongodb://${MONGO_APP_USERNAME}:${MONGO_APP_PASSWORD}@unifi-mongo:27017/unifi_stat
      DB_NAME: unifi
    ports:
      - "8443:8443"
      - "8080:8080"
      - "3478:3478/udp"
      - "10001:10001/udp"
    volumes:
      - ./unifi-data:/unifi
    networks:
      - unifi-net
    security_opt:
      - no-new-privileges:true

networks:
  unifi-net:
    driver: bridge
